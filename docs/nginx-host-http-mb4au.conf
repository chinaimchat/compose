# 宿主机 Nginx：HTTP（非 HTTPS）反代到本机 Docker Compose 已映射端口
# -----------------------------------------------------------------------------
# 与当前 .env 策略一致：
#   - 用户 Web + API：浏览器走 http://mb4au.com ，API 路径为 /api/v1/…（由 web 容器内 Nginx 反代到 server）
#   - 管理后台：http://houtai.mb4au.com → manager 容器（83）
#
# 用法（Linux 常见）：
#   sudo cp docs/nginx-host-http-mb4au.conf /etc/nginx/sites-available/mb4au.conf
#   sudo ln -sf /etc/nginx/sites-available/mb4au.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# DNS：mb4au.com、www.mb4au.com、houtai.mb4au.com → 本机公网 IP（与 compose 中 EXTERNAL_IP 一致）
#
# 若 80 端口已被宝塔等占用：把下方 listen 80 改成未占用端口，或把 server 块 include 进现有 vhost。
# -----------------------------------------------------------------------------

worker_processes auto;
error_log /var/log/nginx/mb4au-error.log warn;
pid /run/nginx-mb4au.pid;

events {
    worker_connections 2048;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # 上游：Compose 默认映射（见 .env 中 TS_WEB_PORT / TS_MANAGEMENT_PORT）
    upstream mb4au_web {
        server 127.0.0.1:82;
    }
    upstream mb4au_manager {
        server 127.0.0.1:83;
    }

    # 用户端 Web（含 /api/ → 由 web 容器继续反代到 server）
    server {
        listen 80;
        listen [::]:80;
        server_name mb4au.com www.mb4au.com;

        client_max_body_size 1000m;

        location / {
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout  600s;
            proxy_send_timeout  600s;
            proxy_buffering off;
            proxy_pass http://mb4au_web;
        }
    }

    # 管理后台
    server {
        listen 80;
        listen [::]:80;
        server_name houtai.mb4au.com;

        client_max_body_size 1000m;

        location / {
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout  600s;
            proxy_send_timeout  600s;
            proxy_pass http://mb4au_manager;
        }
    }
}

# =============================================================================
# Android / iOS 工程里常见要填的地址（以各仓库里实际配置项名为准）
# -----------------------------------------------------------------------------
# HTTP API（与 Web 同源 /api/v1）：  http://mb4au.com/api/v1/
#   若 SDK 要求「不含 path 的 baseURL」，按该 SDK 文档拼接 /api/v1。
# 悟空 IM 长连接（不经上面 Nginx，多为直连公网 IP + 端口）：
#   TCP  202.95.15.158:5100   WebSocket  ws://202.95.15.158:5200
#   端口以 compose/.env 中 WK_TCP_PORT / WK_WS_PORT 为准。
# MinIO 直链（与 .env 中 TS_MINIO_DOWNLOADURL 一致）：  http://202.95.15.158:9000
# 管理后台浏览器访问：  http://houtai.mb4au.com
# =============================================================================
