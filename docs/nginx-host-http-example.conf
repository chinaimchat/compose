# 宿主机 Nginx：HTTP（非 HTTPS）反代到本机 Docker Compose 已映射端口
# -----------------------------------------------------------------------------
# 与 .env.example 的 PUBLIC_* 策略一致：
#   - 用户 Web + API：http://example.com 或 http://www.example.com
#   - API 路径：/v1/ → server:8090
#   - WebSocket：/ws → wukongim:5200
#   - 管理后台：http://admin.example.com → manager 容器（83）
#
# 用法（Linux 常见）：
#   sudo cp docs/nginx-host-http-example.conf /etc/nginx/sites-available/example.conf
#   sudo ln -sf /etc/nginx/sites-available/example.conf /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# DNS：example.com、www.example.com、web.example.com、admin.example.com、im.example.com → 本机公网 IP
# 注意：im.example.com:5100 是四层 TCP 长连接，一般不走本文件的 HTTP Nginx 反代。
# -----------------------------------------------------------------------------

worker_processes auto;
error_log /var/log/nginx/example-error.log warn;
pid /run/nginx-example.pid;

events {
    worker_connections 2048;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile        on;
    keepalive_timeout  65;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream app_web {
        server 127.0.0.1:82;
    }
    upstream app_api {
        server 127.0.0.1:8090;
    }
    upstream app_ws {
        server 127.0.0.1:5200;
    }
    upstream app_manager {
        server 127.0.0.1:83;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name example.com www.example.com web.example.com;

        client_max_body_size 1000m;

        location /v1/ {
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host  $host;
            proxy_set_header token             $http_token;
            proxy_set_header Authorization     $http_authorization;
            proxy_set_header X-Token           $http_x_token;
            proxy_set_header X-Access-Token    $http_x_access_token;
            proxy_set_header appid             $http_appid;
            proxy_set_header package           $http_package;
            proxy_set_header os                $http_os;
            proxy_set_header model             $http_model;
            proxy_set_header version           $http_version;
            proxy_read_timeout  600s;
            proxy_send_timeout  600s;
            proxy_request_buffering off;
            proxy_pass http://app_api;
        }

        location /ws {
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout  86400s;
            proxy_send_timeout  86400s;
            proxy_pass http://app_ws;
        }

        location / {
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_pass http://app_web;
        }
    }

    server {
        listen 80;
        listen [::]:80;
        server_name admin.example.com;

        client_max_body_size 1000m;

        location / {
            proxy_http_version 1.1;
            proxy_set_header Host              $host;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;
            proxy_read_timeout  600s;
            proxy_send_timeout  600s;
            proxy_pass http://app_manager;
        }
    }
}
